<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Urban Flow | Login</title>
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-card">
        <h1 id="auth-title">Welcome Back</h1>
        <p id="auth-subtitle">Please enter your details</p>
        <form id="auth-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div id="register-fields" class="hidden">
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="auth-btn" id="submit-btn">Sign In</button>
        </form>
        <div class="auth-footer">
            <p><a href="#" id="toggle-auth">Create Account</a></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('auth-form');
        const toggleBtn = document.getElementById('toggle-auth');
        const registerFields = document.getElementById('register-fields');
        const authTitle = document.getElementById('auth-title');
        let isLogin = true;

        toggleBtn.onclick = (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            authTitle.innerText = isLogin ? "Welcome Back" : "Create Account";
            document.getElementById('submit-btn').innerText = isLogin ? "Sign In" : "Register";
            toggleBtn.innerText = isLogin ? "Create Account" : "Back to Login";
            registerFields.classList.toggle('hidden');
        };

        form.onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passInput = document.getElementById('password');
            let users = JSON.parse(localStorage.getItem('urban_users')) || [];

            if (isLogin) {
                const userFound = users.find(u => u.email === email);
                if (!userFound) {
                    alert("❌ ไม่พบอีเมลนี้ในระบบ");
                } else if (userFound.password !== password) {
                    passInput.classList.add('error-shake');
                    alert("⚠️ รหัสผ่านไม่ถูกต้อง กรุณาลองใหม่");
                    setTimeout(() => passInput.classList.remove('error-shake'), 300);
                    passInput.value = "";
                    passInput.focus();
                } else {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('userEmail', email);
                    window.location.href = 'index.html';
                }
            } else {
                const confirmPass = document.getElementById('confirm-password').value;
                if (password !== confirmPass) { alert("❌ รหัสผ่านไม่ตรงกัน"); return; }
                if (users.find(u => u.email === email)) { alert("⚠️ อีเมลนี้ถูกใช้ไปแล้ว"); return; }
                users.push({ email, password });
                localStorage.setItem('urban_users', JSON.stringify(users));
                alert("🎉 สมัครสมาชิกสำเร็จ!");
                toggleBtn.click();
            }
        };
    </script>
</body>
</html>
